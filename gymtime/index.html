<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Jimbro - Gymtime</title>
    <link rel="icon" href="/icons/favicon.ico" />
    <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png" />
    <link rel="manifest" href="/app.webmanifest" />
  </head>
  <body class="app">
    <div class="app-page">
      <header class="app-header">
        <a id="back-button" class="link-primary"
          ><svg
            xmlns="http://www.w3.org/2000/svg"
            fill="none"
            viewBox="0 0 24 24"
            stroke-width="1.5"
            stroke="currentColor"
            class="size-6"
          >
            <path stroke-linecap="round" stroke-linejoin="round" d="M10.5 19.5 3 12m0 0 7.5-7.5M3 12h18" />
          </svg>
        </a>
        <h1 class="app-header-title">
          <!-- Name of program -->
        </h1>
        <button id="delete-workout-session-btn" class="link-primary ml-auto font-semibold">
          <svg
            xmlns="http://www.w3.org/2000/svg"
            fill="none"
            viewBox="0 0 24 24"
            stroke-width="1.5"
            stroke="currentColor"
            class="size-6"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              d="m14.74 9-.346 9m-4.788 0L9.26 9m9.968-3.21c.342.052.682.107 1.022.166m-1.022-.165L18.16 19.673a2.25 2.25 0 0 1-2.244 2.077H8.084a2.25 2.25 0 0 1-2.244-2.077L4.772 5.79m14.456 0a48.108 48.108 0 0 0-3.478-.397m-12 .562c.34-.059.68-.114 1.022-.165m0 0a48.11 48.11 0 0 1 3.478-.397m7.5 0v-.916c0-1.18-.91-2.164-2.09-2.201a51.964 51.964 0 0 0-3.32 0c-1.18.037-2.09 1.022-2.09 2.201v.916m7.5 0a48.667 48.667 0 0 0-7.5 0"
            />
          </svg>
          Delete
        </button>
      </header>
      <div class="app-page-content gap-5">
        <details open id="workout-details">
          <summary>Workout details</summary>
          <form id="gymtime-form" class="flex flex-col gap-2">
            <input type="hidden" name="programId" value="" required />
            <input class="w-full p-2 rounded border border-neutral-600" type="date" name="date" value="" required />
            <div class="flex gap-2 w-full">
              <input
                class="w-full p-2 rounded border border-neutral-600 grow"
                type="text"
                name="location"
                placeholder="Location"
              />
              <button
                type="button"
                id="get-location-btn"
                class="btn-secondary px-3 shrink-0"
                aria-label="Get current location"
                title="Get current location"
              >
                <svg
                  xmlns="http://www.w3.org/2000/svg"
                  fill="none"
                  viewBox="0 0 24 24"
                  stroke-width="1.5"
                  stroke="currentColor"
                  class="size-6"
                >
                  <path stroke-linecap="round" stroke-linejoin="round" d="M15 10.5a3 3 0 1 1-6 0 3 3 0 0 1 6 0Z" />
                  <path
                    stroke-linecap="round"
                    stroke-linejoin="round"
                    d="M19.5 10.5c0 7.142-7.5 11.25-7.5 11.25S4.5 17.642 4.5 10.5a7.5 7.5 0 1 1 15 0Z"
                  />
                </svg>
              </button>
            </div>
            <textarea class="w-full p-2 rounded border border-neutral-600" name="notes" placeholder="Notes"></textarea>
            <button type="submit" class="btn-primary text-white w-full">Save & start workout</button>
          </form>
        </details>
        <div id="exercises-list" class="flex flex-col gap-2">
          <!-- Exercises will be rendered here -->
        </div>

        <div id="save-to-program-card" class="card card-pending card-clickable mt-16 hidden">
          <div class="flex items-center justify-center gap-1 h-16">
            <svg
              xmlns="http://www.w3.org/2000/svg"
              fill="none"
              viewBox="0 0 24 24"
              stroke-width="1.5"
              stroke="currentColor"
              class="size-6"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                d="M17.593 3.322c1.1.128 1.907 1.077 1.907 2.185V21L12 17.25 4.5 21V5.507c0-1.108.806-2.057 1.907-2.185a48.507 48.507 0 0 1 11.186 0Z"
              />
            </svg>
            <div class="text-center text-lg font-bold">Save to program</div>
          </div>
        </div>

        <div id="add-exercise-card" class="card card-pending card-clickable mt-2">
          <div class="flex items-center justify-center gap-1 h-16">
            <svg
              xmlns="http://www.w3.org/2000/svg"
              fill="none"
              viewBox="0 0 24 24"
              stroke-width="1.5"
              stroke="currentColor"
              class="size-6"
            >
              <path stroke-linecap="round" stroke-linejoin="round" d="M12 4.5v15m7.5-7.5h-15" />
            </svg>
            <div class="text-center text-lg font-bold">Add exercise</div>
          </div>
        </div>

        <template id="workout-exercise-item-template">
          <div class="card">
            <header>
              <div class="flex flex-col w-full relative">
                <div class="flex justify-between items-start w-full">
                  <h3 class="exercise-name card-title">
                    <!-- -->
                  </h3>

                  <span class="exercise-muscle badge ml-2">
                    <!-- -->
                  </span>
                </div>
              </div>
            </header>
            <details class="exercise-details">
              <summary>Exercise sets</summary>
              <div class="flex items-center gap-2 relative z-10 mb-2">
                <button class="move-up-workout-session-exercise-btn link-primary font-semibold hidden p-1 -m-1">
                  <svg
                    xmlns="http://www.w3.org/2000/svg"
                    fill="none"
                    viewBox="0 0 24 24"
                    stroke-width="1.5"
                    stroke="currentColor"
                    class="size-5"
                  >
                    <path stroke-linecap="round" stroke-linejoin="round" d="M4.5 15.75l7.5-7.5 7.5 7.5" />
                  </svg>
                </button>
                <button class="move-down-workout-session-exercise-btn link-primary font-semibold hidden p-1 -m-1">
                  <svg
                    xmlns="http://www.w3.org/2000/svg"
                    fill="none"
                    viewBox="0 0 24 24"
                    stroke-width="1.5"
                    stroke="currentColor"
                    class="size-5"
                  >
                    <path stroke-linecap="round" stroke-linejoin="round" d="M19.5 8.25l-7.5 7.5-7.5-7.5" />
                  </svg>
                </button>
                <button class="swap-workout-session-exercise-btn link-primary font-semibold hidden p-1 -m-1">
                  <svg
                    xmlns="http://www.w3.org/2000/svg"
                    fill="none"
                    viewBox="0 0 24 24"
                    stroke-width="1.5"
                    stroke="currentColor"
                    class="size-5"
                  >
                    <path
                      stroke-linecap="round"
                      stroke-linejoin="round"
                      d="M7.5 21 3 16.5m0 0L7.5 12M3 16.5h13.5m0-13.5L21 7.5m0 0L16.5 12M21 7.5H7.5"
                    />
                  </svg>
                </button>
                <button class="delete-workout-session-exercise-btn link-primary font-semibold hidden p-1 -m-1">
                  <svg
                    xmlns="http://www.w3.org/2000/svg"
                    fill="none"
                    viewBox="0 0 24 24"
                    stroke-width="1.5"
                    stroke="currentColor"
                    class="size-5"
                  >
                    <path
                      stroke-linecap="round"
                      stroke-linejoin="round"
                      d="m14.74 9-.346 9m-4.788 0L9.26 9m9.968-3.21c.342.052.682.107 1.022.166m-1.022-.165L18.16 19.673a2.25 2.25 0 0 1-2.244 2.077H8.084a2.25 2.25 0 0 1-2.244-2.077L4.772 5.79m14.456 0a48.108 48.108 0 0 0-3.478-.397m-12 .562c.34-.059.68-.114 1.022-.165m0 0a48.11 48.11 0 0 1 3.478-.397m7.5 0v-.916c0-1.18-.91-2.164-2.09-2.201a51.964 51.964 0 0 0-3.32 0c-1.18.037-2.09 1.022-2.09 2.201v.916m7.5 0a48.667 48.667 0 0 0-7.5 0"
                    />
                  </svg>
                </button>
              </div>
              <div class="completed-sets flex flex-col gap-2">
                <!-- Completed sets will be rendered here -->
              </div>
              <div class="next-set flex flex-col gap-2 mt-4">
                <h4 class="next-set-number text-md font-bold">Next set</h4>
                <form class="next-set-form flex flex-col gap-2">
                  <div class="flex gap-2 items-center mb-2">
                    <label class="text-jim-neutral-secondary"
                      >Reps:
                      <input type="number" name="set-reps" min="1" required placeholder="Reps" class="mt-2" />
                    </label>
                    <label class="text-jim-neutral-secondary"
                      >Weight:
                      <input
                        type="number"
                        name="set-weight"
                        min="0"
                        step="0.01"
                        required
                        placeholder="Weight"
                        class="mt-2"
                      />
                    </label>
                  </div>
                  <button type="submit" class="btn-primary text-white w-full h-20">Finished set</button>
                </form>
              </div>
              <button type="button" class="view-history-btn btn-secondary mt-4 w-full text-sm">View History</button>
            </details>
          </div>
        </template>

        <template id="completed-set-item-template">
          <div class="set flex items-center gap-2 border rounded-md p-2 justify-around">
            <div class="pr-2 text-jim-neutral-secondary">
              Set <span class="set-number font-bold text-jim-accent"></span>
            </div>
            <div class="pr-2 text-jim-neutral-secondary">
              Reps <span class="set-reps font-bold text-jim-accent"></span>
            </div>
            <div class="text-jim-neutral-secondary">
              Weight <span class="set-weight font-bold text-jim-accent"></span>
            </div>
          </div>
        </template>
      </div>
    </div>

    <dialog id="break-countdown-dialog">
      <div class="h-full w-full flex flex-col items-center justify-between">
        <p class="text-4xl font-bold"><span id="sets-done" class="text-jim-accent"></span> done.</p>
        <h2 id="countdown" class="text-9xl font-bold font-mono">
          <!-- -->
        </h2>
        <div class="w-full flex flex-col gap-4 items-center">
          <p id="next-exercise-message" class="text-xl font-bold">
            Coming up: <span id="next-exercise-name" class="text-jim-accent"></span>
          </p>
          <button id="skip-break" class="btn-secondary self-end">Skip</button>
        </div>
      </div>
    </dialog>

    <dialog id="edit-set-dialog">
      <header class="flex justify-between items-center mb-4">
        <h2 class="text-xl font-bold">Edit set</h2>
        <button
          type="button"
          class="close-dialog-btn border border-neutral-600/50 p-2 rounded-xl text-neutral-400 hover:text-white hover:bg-neutral-700 transition-colors duration-200"
          aria-label="Close dialog"
        >
          <svg
            xmlns="http://www.w3.org/2000/svg"
            fill="none"
            viewBox="0 0 24 24"
            stroke-width="1.5"
            stroke="currentColor"
            class="size-6"
          >
            <path stroke-linecap="round" stroke-linejoin="round" d="M6 18 18 6M6 6l12 12" />
          </svg>
        </button>
      </header>
      <form id="edit-set-form" class="flex flex-col gap-2">
        <input type="number" name="set-reps" id="set-reps" min="1" required placeholder="Reps" />
        <input type="number" name="set-weight" id="set-weight" min="0" step="0.01" required placeholder="Weight" />
        <div class="flex gap-3 justify-end mt-6">
          <button type="button" id="dialog-cancel" class="btn-secondary">Cancel</button>
          <button type="submit" class="btn-primary">Save</button>
        </div>
      </form>
    </dialog>

    <dialog
      id="exercise-history-dialog"
      class="w-[95vw] h-[95vh] sm:w-[80vw] sm:h-[80vh] max-w-none max-h-none m-auto overflow-hidden rounded-xl"
    >
      <header class="flex justify-between items-center">
        <h2 class="text-xl font-bold exercise-history-title flex items-center gap-2">
          <span>Exercise History</span>
        </h2>
        <button
          type="button"
          class="close-dialog-btn border border-neutral-600/50 p-2 rounded-xl text-neutral-400 hover:text-white hover:bg-neutral-700 transition-colors duration-200"
          aria-label="Close dialog"
        >
          <svg
            xmlns="http://www.w3.org/2000/svg"
            fill="none"
            viewBox="0 0 24 24"
            stroke-width="1.5"
            stroke="currentColor"
            class="size-6"
          >
            <path stroke-linecap="round" stroke-linejoin="round" d="M6 18 18 6M6 6l12 12" />
          </svg>
        </button>
      </header>
      <div class="h-[calc(100%-4rem)] w-full flex flex-col">
        <div class="text-sm text-neutral-400 mb-4">Average weight per session</div>
        <div class="grow w-full relative">
          <canvas id="exercise-history-chart"></canvas>
        </div>
      </div>
    </dialog>

    <dialog id="add-exercise-dialog" class="w-full h-full">
      <header class="flex justify-between items-center mb-4">
        <h2 class="text-xl font-bold">Add exercise</h2>
        <button
          type="button"
          class="close-dialog-btn border border-neutral-600/50 p-2 rounded-xl text-neutral-400 hover:text-white hover:bg-neutral-700 transition-colors duration-200"
          aria-label="Close dialog"
        >
          <svg
            xmlns="http://www.w3.org/2000/svg"
            fill="none"
            viewBox="0 0 24 24"
            stroke-width="1.5"
            stroke="currentColor"
            class="size-6"
          >
            <path stroke-linecap="round" stroke-linejoin="round" d="M6 18 18 6M6 6l12 12" />
          </svg>
        </button>
      </header>
      <div class="app-page-content">
        <div class="mb-6">
          <label for="muscle-filter">Filter by muscle group</label>
          <select id="muscle-filter">
            <!-- Muscle groups will be rendered here -->
          </select>
        </div>

        <div id="exercises-grid" class="grid grid-cols-1 gap-4">
          <!-- Exercises will be rendered here -->
        </div>
        <template id="exercise-item-template">
          <div class="card card-hover">
            <header>
              <h3 class="exercise-name card-title">
                <!-- -->
              </h3>
              <span class="exercise-muscle badge">
                <!-- -->
              </span>
            </header>
            <p class="text-sm text-neutral-400 font-medium">
              <span class="exercise-sets"></span> sets × <span class="exercise-reps"></span> reps
            </p>
          </div>
        </template>
      </div>
      <footer class="flex gap-3 justify-end mt-6">
        <button type="button" class="btn-secondary dialog-cancel">Cancel</button>
      </footer>
    </dialog>

    <script type="module" src="../src/pages/gymtime/index.ts"></script>
    <script type="module" src="../src/navigation.ts"></script>
    <script type="module" src="../src/features/hapticFeedback/index.ts"></script>
  </body>
</html>
