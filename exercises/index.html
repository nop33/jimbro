<!DOCTYPE html>
<html lang="en">
  <load src="../src/partials/head.html" title="Exercises" />

  <body class="app">
    <div class="app-page">
      <header class="app-header">
        <a id="back-button" class="link-primary"><load src="../src/partials/icon.html" icon="icon-back" /> </a>
        <h1 class="app-header-title">Exercises</h1>
        <button id="new-exercise-btn" class="link-primary ml-auto font-semibold">
          <load src="../src/partials/icon.html" icon="icon-plus" />
          New
        </button>
      </header>

      <load src="../src/partials/exercisesGrid.html" gridClasses="md:grid-cols-2 lg:grid-cols-3" />
    </div>

    <dialog id="exercise-dialog">
      <header>
        <h2 id="dialog-title" class="text-2xl font-bold">New Exercise</h2>
        <button id="delete-exercise-btn" class="link-primary font-semibold justify-end">
          <load src="../src/partials/icon.html" icon="icon-trash" />
        </button>
      </header>
      <form id="exercise-form" class="flex flex-col gap-5">
        <input type="hidden" id="exercise-id" name="id" />
        <div>
          <label for="exercise-name">Name</label>
          <input autofocus type="text" id="exercise-name" name="name" required />
        </div>
        <div>
          <label for="exercise-muscle">Muscle group</label>
          <select id="exercise-muscle" name="muscle" required>
            <!-- Muscle groups will be rendered here -->
          </select>
        </div>
        <div>
          <label for="exercise-sets">Default sets</label>
          <input type="number" id="exercise-sets" name="sets" min="1" required />
        </div>
        <div>
          <label for="exercise-reps">Default reps</label>
          <input type="number" id="exercise-reps" name="reps" min="1" required />
        </div>
        <div class="flex gap-3 justify-end mt-6">
          <button type="button" id="dialog-cancel" class="btn-secondary">Cancel</button>
          <button type="submit" class="btn-primary">Save</button>
        </div>
      </form>
    </dialog>

    <script type="module" src="../src/pages/exercises/index.ts"></script>
    <script type="module" src="../src/navigation.ts"></script>
    <script type="module" src="../src/features/hapticFeedback/index.ts"></script>
  </body>
</html>
