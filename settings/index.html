<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Jimbro - Settings</title>
    <link rel="icon" href="/icons/favicon.ico" />
    <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png" />
    <link rel="manifest" href="/app.webmanifest" />
  </head>
  <body class="app">
    <div class="app-page">
      <header class="app-header">
        <a id="back-button" class="link-primary"
          ><svg
            xmlns="http://www.w3.org/2000/svg"
            fill="none"
            viewBox="0 0 24 24"
            stroke-width="1.5"
            stroke="currentColor"
            class="size-6"
          >
            <path stroke-linecap="round" stroke-linejoin="round" d="M10.5 19.5 3 12m0 0 7.5-7.5M3 12h18" />
          </svg>
        </a>
        <h1 class="app-header-title">Settings</h1>
      </header>

      <div class="app-page-content">
        <div class="flex flex-col gap-6">
          <div class="card card-hover">
            <details id="cloud-backup-details">
              <summary class="flex items-center justify-between">
                <span class="text-xl font-bold text-jim-neutral">☁️ Cloud Backup</span>
                <span id="cloud-summary-status" class="text-sm text-jim-neutral-tertiary"></span>
              </summary>
              <div class="flex flex-col gap-2 mt-4">
                <label class="text-jim-neutral-secondary">
                  User ID
                  <input type="text" id="cloud-userid" placeholder="e.g. ilias" class="mt-2" />
                </label>
                <label class="text-jim-neutral-secondary">
                  Token
                  <input type="text" id="cloud-token" placeholder="your secret token" class="mt-2" />
                </label>
                <button id="cloud-save" class="btn-primary">Save credentials</button>
                <div class="flex gap-2 mt-2">
                  <button id="cloud-backup-now" class="btn-secondary flex-1">Backup now</button>
                  <button id="cloud-restore" class="btn-secondary flex-1">Restore latest</button>
                </div>
              </div>
            </details>
          </div>

          <div class="card card-hover">
            <details>
              <summary class="text-xl font-bold text-jim-neutral">Manage local data</summary>
              <div class="flex flex-col gap-6 mt-4">
                <div>
                  <h3 class="text-lg font-bold mb-2">Data Export</h3>
                  <button id="export-json" class="btn-primary w-full">Export to JSON</button>
                </div>
                <div>
                  <h3 class="text-lg font-bold mb-2">Data Import</h3>
                  <label for="import-input" class="block text-sm font-medium mb-2">Import from JSON file</label>
                  <input
                    type="file"
                    id="import-input"
                    accept=".json"
                    class="w-full p-2 rounded border border-neutral-600"
                  />
                </div>
                <div>
                  <h3 class="text-lg font-bold mb-2">Reset Database</h3>
                  <button id="reset-database" class="btn-primary btn-danger w-full">Reset Database</button>
                </div>
              </div>
            </details>
          </div>
        </div>
      </div>
    </div>

    <script type="module" src="../src/pages/settings/index.ts"></script>
    <script type="module" src="../src/navigation.ts"></script>
    <script type="module" src="../src/features/hapticFeedback/index.ts"></script>
  </body>
</html>
