<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Jimbro - Workouts</title>
    <link rel="icon" href="/icons/favicon.ico" />
    <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png" />
    <link rel="manifest" href="/app.webmanifest" />
  </head>
  <body class="app">
    <div class="app-page">
      <header class="app-header">
        <a id="back-button" class="link-primary"
          ><svg
            xmlns="http://www.w3.org/2000/svg"
            fill="none"
            viewBox="0 0 24 24"
            stroke-width="1.5"
            stroke="currentColor"
            class="size-6"
          >
            <path stroke-linecap="round" stroke-linejoin="round" d="M10.5 19.5 3 12m0 0 7.5-7.5M3 12h18" />
          </svg>
        </a>
        <h1 class="app-header-title">Workouts</h1>
        <button id="new-workout-btn" class="link-primary ml-auto items-center flex" aria-label="Add new workout">
          <svg
            xmlns="http://www.w3.org/2000/svg"
            fill="none"
            viewBox="0 0 24 24"
            stroke-width="1.5"
            stroke="currentColor"
            class="size-6"
          >
            <path stroke-linecap="round" stroke-linejoin="round" d="M12 4.5v15m7.5-7.5h-15" />
          </svg>
          New
        </button>
      </header>
      <div class="app-page-content">
        <div class="flex items-center gap-3 mb-4">
          <div id="intro" class="text-center text-lg bg-jim-dark-blue p-4 rounded-lg flex-1">
            <!-- Intro text will be rendered here -->
          </div>
          <button id="workout-mode-badge" class="btn-secondary text-xs px-3 py-2 light-haptic shrink-0"></button>
        </div>
        <div id="workout-weeks" class="flex flex-col gap-6">
          <!-- Workout weeks will be rendered here -->
        </div>
        <template id="workout-week-template">
          <div class="workout-week">
            <h2 class="workout-week-title text-xl font-bold mb-2">
              <span class="workout-week-week text-jim-accent">
                <!-- -->
              </span>
              <span class="workout-week-year text-jim-primary/60">
                <!-- -->
              </span>
            </h2>
            <ul class="workout-week-list grid gap-2 items-stretch">
              <!-- Workout items will be rendered here -->
            </ul>
          </div>
        </template>
        <template id="workout-item-template">
          <li>
            <div class="card h-full p-4 justify-between flex flex-col with-bg gap-1 light-haptic">
              <h2 class="workout-title text-sm font-bold mb-2">
                <!-- -->
              </h2>
              <div class="flex flex-col gap-1">
                <p class="workout-status text-sm text-jim-neutral-tertiary">
                  <!-- -->
                </p>
                <p class="workout-date text-xs text-jim-neutral-secondary">
                  <!-- -->
                </p>
              </div>
            </div>
          </li>
        </template>
      </div>
    </div>

    <dialog id="new-workout-dialog">
      <header class="flex justify-between items-center mb-4">
        <h2 id="dialog-title" class="text-xl font-bold">Select program</h2>
        <button
          type="button"
          class="close-dialog-btn border border-neutral-600/50 p-2 rounded-xl text-neutral-400 hover:text-white hover:bg-neutral-700 transition-colors duration-200"
          aria-label="Close dialog"
        >
          <svg
            xmlns="http://www.w3.org/2000/svg"
            fill="none"
            viewBox="0 0 24 24"
            stroke-width="1.5"
            stroke="currentColor"
            class="size-6"
          >
            <path stroke-linecap="round" stroke-linejoin="round" d="M6 18 18 6M6 6l12 12" />
          </svg>
        </button>
      </header>
      <ul id="programs-list" class="grid grid-cols-1 md:grid-cols-3 gap-2 items-stretch">
        <!-- Programs will be rendered here -->
      </ul>
      <div class="flex gap-3 justify-end mt-6">
        <button type="button" id="dialog-cancel" class="btn-secondary">Cancel</button>
      </div>
      <template id="program-item-template">
        <li>
          <a class="program-link" href="#">
            <div class="card h-full p-4 justify-between flex flex-col card-simple">
              <h3 class="program-name card-title">
                <!-- -->
              </h3>
              <p class="this-week-status">
                <!-- -->
              </p>
              <p class="last-completed-date text-sm text-neutral-400">
                <!-- -->
              </p>
            </div>
          </a>
        </li>
      </template>
    </dialog>

    <dialog id="workout-mode-dialog">
      <header class="flex justify-between items-center mb-4">
        <h2 class="text-xl font-bold">Workout Mode</h2>
        <button
          type="button"
          class="close-dialog-btn border border-neutral-600/50 p-2 rounded-xl text-neutral-400 hover:text-white hover:bg-neutral-700 transition-colors duration-200"
          aria-label="Close dialog"
        >
          <svg
            xmlns="http://www.w3.org/2000/svg"
            fill="none"
            viewBox="0 0 24 24"
            stroke-width="1.5"
            stroke="currentColor"
            class="size-6"
          >
            <path stroke-linecap="round" stroke-linejoin="round" d="M6 18 18 6M6 6l12 12" />
          </svg>
        </button>
      </header>
      <div class="flex flex-col gap-4">
        <fieldset>
          <legend class="text-jim-neutral-secondary text-sm font-semibold mb-2">Mode</legend>
          <div class="flex gap-4">
            <label class="flex items-center gap-2 cursor-pointer">
              <input type="radio" name="workout-mode" value="rotation" class="accent-jim-accent" />
              <span>Rotation</span>
            </label>
            <label class="flex items-center gap-2 cursor-pointer">
              <input type="radio" name="workout-mode" value="freestyle" class="accent-jim-accent" />
              <span>Freestyle</span>
            </label>
          </div>
        </fieldset>
        <div id="weekly-goal-container" class="hidden">
          <label class="text-jim-neutral-secondary">
            Weekly workout goal
            <input type="number" id="weekly-goal-input" min="1" max="7" value="3" class="mt-2" />
          </label>
        </div>
        <p id="workout-mode-description" class="text-sm text-jim-neutral-tertiary"></p>
      </div>
    </dialog>

    <script type="module" src="../src/pages/workouts/index.ts"></script>
    <script type="module" src="../src/navigation.ts"></script>
    <script type="module" src="../src/features/hapticFeedback/index.ts"></script>
  </body>
</html>
